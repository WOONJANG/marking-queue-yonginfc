<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>작업번호 연결</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="bind-wrap">
        <section class="card bind-card">
            <div class="brand-badge bind-badge"><span class="brand-dot"></span> QR CONNECT</div>
            <h1>작업번호 연결</h1>
            <p class="sub">번호카드 QR을 찍은 뒤 이름, 휴대전화, 비고를 입력하면 관리자 목록에 등록됩니다.</p>

            <div class="info-box">
                <div><strong>작업번호</strong> <span id="infoWorkNo">확인 중...</span></div>
                <div><strong>현재 상태</strong> <span id="infoStatus">-</span></div>
                <div><strong>연결 상태</strong> <span id="infoClaim">-</span></div>
            </div>

            <form id="bindForm" class="bind-form" method="post" target="bindTargetIframe">
                <input type="hidden" name="action" value="bindClaim">
                <input type="hidden" name="token" id="tokenField">

                <div class="field">
                    <label for="customerName">고객명</label>
                    <input type="text" id="customerName" name="customerName" placeholder="선택 입력" autocomplete="name">
                </div>

                <div class="field">
                    <label for="phone">휴대전화 번호</label>
                    <input type="text" id="phone" name="phone" placeholder="01012345678" inputmode="numeric" pattern="[0-9]*" maxlength="11" autocomplete="tel">
                </div>

                <div class="field">
                    <label for="note">비고</label>
                    <input type="text" id="note" name="note" placeholder="선택 입력">
                </div>

                <label class="agree">
                    <input type="checkbox" id="agreeCheckbox">
                    <span>작업번호 연결, 연결 완료 안내, 작업 완료 안내를 위한 개인정보 처리에 동의합니다.</span>
                    <span><b>원활한 작업을 위해 카카오 알림톡을 받으실 전화번호를 정확하게 입력해주세요.</b></span>
                </label>
                <input type="hidden" name="agree" id="agreeField" value="N">

                <div class="actions">
                    <button type="submit" class="primary-btn" id="bindSubmitBtn">연결하기</button>
                </div>
            </form>
            <div id="bindMsg" class="msg"></div>
            <div class="sub bind-help">같은 작업번호는 한 번만 연결되며, 완료 후 관리자가 삭제하면 다시 사용할 수 있습니다.</div>
        </section>
    </div>

    <iframe name="bindTargetIframe" id="bindTargetIframe" class="hidden-iframe"></iframe>

    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/bind.js"></script>
</body>

</html>
